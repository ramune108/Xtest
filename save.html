<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Save - Twitter Video Tools</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="site-header"><a href="index.html">Twitter Video Tools</a></header>

    <main class="input-container">
        <p style="font-weight: bold; color: #555; margin-bottom: 15px;">Save Twitter Video</p>
        <input type="text" id="tweetUrl" class="text-input" placeholder="Paste Tweet URL here...">
        <button id="extractBtn" class="primary-btn" onclick="extractVideo()"><i class="fas fa-file-download"></i> Extract Video</button>
        <div id="results"></div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-trophy" style="font-size:18px;"></i>Ranking</a>
        <a href="search.html" class="nav-item"><i class="fas fa-search" style="font-size:18px;"></i>Search</a>
        <a href="save.html" class="nav-item active"><i class="fas fa-plus-circle" style="font-size:18px;"></i>Save</a>
    </nav>

    <script>
        const SUPABASE_URL = 'https://jziiuyezguukewkfpudw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_KWKB8rprJAhTqQz9PoNscg_NowmknXH';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function extractVideo() {
            const urlInput = $('#tweetUrl').val().trim();
            if (!urlInput) { alert("URLを入力してください"); return; }

            $('#extractBtn').prop('disabled', true).text("Extracting...");
            $('#results').html('<p style="margin-top:20px;">Analyzing with yt-dlp...</p>');

            try {
                const response = await fetch("/api", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: urlInput })
                });
                const data = await response.json();

                if (data.status === "success") {
                    $('#results').html(`
                        <div class="preview-box">
                            <p style="font-size:0.8rem; color:#28a745; font-weight:bold; margin-bottom:10px;">Success!</p>
                            <video src="${data.url}" controls class="preview-video" poster="${data.thumbnail}"></video>
                            <button class="download-btn" onclick="downloadAndReg('${data.url}', '${urlInput}', '${data.thumbnail}', '${data.title}')">
                                <i class="fas fa-download"></i> Download & Auto-Register
                            </button>
                        </div>
                    `);
                } else {
                    $('#results').html(`<p style="color:red; margin-top:20px;">Error: ${data.message}</p>`);
                }
            } catch (e) {
                $('#results').html('<p style="color:red; margin-top:20px;">Connection Error.</p>');
            } finally {
                $('#extractBtn').prop('disabled', false).html('<i class="fas fa-file-download"></i> Extract Video');
            }
        }

        async function downloadAndReg(vUrl, tUrl, thumb, title) {
            const a = document.createElement('a');
            a.href = vUrl;
            a.rel = "noreferrer";
            a.target = "_blank";
            a.click();

            await _supabase.rpc('increment_save_count', {
                target_tweet_url: tUrl, target_video_url: vUrl, target_thumbnail_url: thumb, target_title: title
            });
            alert("Registered to Ranking!");
        }
    </script>
</body>
</html>
