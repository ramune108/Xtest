<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Save - Twitter Video Tools</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="site-header">
        <a href="index.html">Twitter Video Tools</a>
    </header>

    <main class="input-container">
        <p style="font-weight: bold; color: #555; margin-bottom: 15px;">Save Twitter Video</p>
        <input type="text" id="tweetUrl" class="text-input" placeholder="Paste Tweet URL here...">
        <button id="extractBtn" class="primary-btn" onclick="extractVideo()">
            <i class="fas fa-file-download"></i> Extract Video
        </button>
        <div id="results"></div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-trophy nav-icon"></i>Ranking</a>
        <a href="search.html" class="nav-item"><i class="fas fa-search nav-icon"></i>Search</a>
        <a href="save.html" class="nav-item active"><i class="fas fa-plus-circle nav-icon"></i>Save</a>
    </nav>

    <script>
        const SUPABASE_URL = 'https://jziiuyezguukewkfpudw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_KWKB8rprJAhTqQz9PoNscg_NowmknXH';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function extractVideo() {
            const urlInput = $('#tweetUrl').val().trim();
            if (!urlInput) { alert("URLを入力してください"); return; }

            // ボタンを無効化
            $('#extractBtn').prop('disabled', true).text("Extracting...");
            $('#results').html('<p style="margin-top:20px;">Analyzing with yt-dlp...</p>');

            try {
                // 1. Python API で動画を抽出
                const response = await fetch("/api", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: urlInput })
                });
                const data = await response.json();

                if (data.status === "success") {
                    // 【重要】成功した瞬間にデータベースへ自動登録（カウントアップ）
                    await _supabase.rpc('increment_save_count', {
                        target_tweet_url: urlInput, 
                        target_video_url: data.url, 
                        target_thumbnail_url: data.thumbnail, 
                        target_title: data.title
                    });

                    // 2. プレビューを表示
                    // controlsList="nodownload" でブラウザ標準のダウンロードメニューを隠します
                    $('#results').html(`
                        <div class="preview-box">
                            <p style="font-size:0.8rem; color:#28a745; font-weight:bold; margin-bottom:10px;">
                                <i class="fas fa-check-circle"></i> Success! Added to Ranking.
                            </p>
                            <video src="${data.url}" controls controlsList="nodownload" oncontextmenu="return false;" class="preview-video" poster="${data.thumbnail}"></video>
                            <button class="download-btn" onclick="onlyDownload('${data.url}')">
                                <i class="fas fa-download"></i> Download Video
                            </button>
                        </div>
                    `);
                } else {
                    $('#results').html(`<p style="color:red; margin-top:20px;">Error: ${data.message}</p>`);
                }
            } catch (e) {
                console.error(e);
                $('#results').html('<p style="color:red; margin-top:20px;">Connection Error.</p>');
            } finally {
                // ボタンを元に戻す
                $('#extractBtn').prop('disabled', false).html('<i class="fas fa-file-download"></i> Extract Video');
            }
        }

        // ダウンロードボタンの処理：動画を別タブで開くだけ
        function onlyDownload(vUrl) {
            const a = document.createElement('a');
            a.href = vUrl;
            a.rel = "noreferrer";
            a.target = "_blank";
            a.click();
        }
    </script>
</body>
</html>
