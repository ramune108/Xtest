<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動画を保存 - 保存ランキング</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 保存ページ専用のスタイル */
        .preview-container {
            margin-top: 20px;
            padding: 20px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .preview-video {
            width: 100%;
            max-height: 400px;
            border-radius: 10px;
            margin-bottom: 15px;
            background: #000;
            display: block;
        }
        .save-confirm-btn {
            background: #28a745;
            color: #fff;
            border: none;
            padding: 15px 20px;
            border-radius: 10px;
            font-weight: bold;
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .save-confirm-btn:active { background: #218838; }

        /* 読み込み中スピナー */
        .loading-spinner {
            margin: 30px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1da1f2;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header class="header">
        <span class="logo">動画を保存</span>
    </header>

    <main class="input-container">
        <p style="font-size: 0.9rem; margin-bottom: 15px; color: #555; line-height: 1.6;">
            X(Twitter)の動画URLを貼り付けてください。<br>
            抽出に成功すると、ランキングへ登録できます。
        </p>
        
        <!-- URL入力欄 -->
        <input type="text" id="tweetUrl" class="text-input" placeholder="https://x.com/user/status/12345...">
        
        <!-- 抽出ボタン -->
        <button id="extractBtn" class="primary-btn" onclick="extractVideo()">動画を抽出する</button>

        <!-- 抽出結果の表示エリア -->
        <div id="results"></div>
    </main>

    <!-- 下部ナビゲーション -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏆</span>
            <span class="label">ランキング</span>
        </a>
        <a href="search.html" class="nav-item">
            <span class="nav-icon">🔍</span>
            <span class="label">検索</span>
        </a>
        <a href="save.html" class="nav-item active">
            <span class="nav-icon">➕</span>
            <span class="label">保存</span>
        </a>
    </nav>

    <script>
        async function extractVideo() {
            const urlInput = document.getElementById('tweetUrl').value;
            const btn = document.getElementById('extractBtn');
            const resultsContainer = document.getElementById('results');

            if (!urlInput) {
                alert("URLを入力してください");
                return;
            }

            // UIを読み込み中状態にする
            btn.disabled = true;
            btn.innerText = "抽出中...";
            resultsContainer.innerHTML = '<div class="loading-spinner"></div>';

            try {
                // Vercel上のAPI (/api/extract.js) へリクエスト
                const response = await fetch("/api/extract", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: urlInput })
                });

                const data = await response.json();
    console.log("API受信データ:", data);

    // /all エンドポイントのレスポンス形式に合わせて取得
    // 一般的に data.data.main.video または data.data.video[0].url に入ります
    let videoUrl = "";
    if (data.status && data.data) {
        // 優先度1: main.video
        videoUrl = data.data.main?.video;
        // 優先度2: video配列の最初の要素
        if (!videoUrl && data.data.video && data.data.video.length > 0) {
            videoUrl = data.data.video[0].url;
        }
    }

    if (videoUrl) {
        showPreview(videoUrl, urlInput);
    } else {
        // エラー理由を表示
        const msg = data.message || "動画URLが見つかりませんでした。";
        resultsContainer.innerHTML = `<div style="color:red;">${msg}</div>`;
    }
}
    </script>
</body>
</html>
