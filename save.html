<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動画を保存 - 保存ランキング</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* 保存ページ専用のスタイル */
        .preview-container {
            margin-top: 20px;
            padding: 20px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        .preview-video {
            width: 100%;
            max-height: 400px;
            border-radius: 10px;
            margin-bottom: 15px;
            background: #000;
            display: block;
        }
        .save-confirm-btn {
            background: #28a745;
            color: #fff;
            border: none;
            padding: 15px 20px;
            border-radius: 10px;
            font-weight: bold;
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .save-confirm-btn:active { background: #218838; }

        /* 読み込み中スピナー */
        .loading-spinner {
            margin: 30px auto;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1da1f2;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header class="header">
        <span class="logo">動画を保存</span>
    </header>

    <main class="input-container">
        <p style="font-size: 0.9rem; margin-bottom: 15px; color: #555; line-height: 1.6;">
            X(Twitter)の動画URLを貼り付けてください。<br>
            抽出に成功すると、ランキングへ登録できます。
        </p>
        
        <!-- URL入力欄 -->
        <input type="text" id="tweetUrl" class="text-input" placeholder="https://x.com/user/status/12345...">
        
        <!-- 抽出ボタン -->
        <button id="extractBtn" class="primary-btn" onclick="extractVideo()">動画を抽出する</button>

        <!-- 抽出結果の表示エリア -->
        <div id="results"></div>
    </main>

    <!-- 下部ナビゲーション -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <span class="nav-icon">🏆</span>
            <span class="label">ランキング</span>
        </a>
        <a href="search.html" class="nav-item">
            <span class="nav-icon">🔍</span>
            <span class="label">検索</span>
        </a>
        <a href="save.html" class="nav-item active">
            <span class="nav-icon">➕</span>
            <span class="label">保存</span>
        </a>
    </nav>

    <script>
        async function extractVideo() {
            const urlInput = document.getElementById('tweetUrl').value;
            const btn = document.getElementById('extractBtn');
            const resultsContainer = document.getElementById('results');

            if (!urlInput) {
                alert("URLを入力してください");
                return;
            }

            // UIを読み込み中状態にする
            btn.disabled = true;
            btn.innerText = "抽出中...";
            resultsContainer.innerHTML = '<div class="loading-spinner"></div>';

            try {
                // Vercel上のAPI (/api/extract.js) へリクエスト
                const response = await fetch("/api/extract", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: urlInput })
                });

                const data = await response.json();
                console.log("API受信データ:", data);

                // All Media Downloader のデータ構造に合わせてURLを取得
                // 階層: data.data.main.video または data.data.video[0].url
                let videoUrl = "";
                if (data.status && data.data) {
                    videoUrl = data.data.main?.video || (data.data.video && data.data.video[0]?.url);
                }

                if (videoUrl) {
                    showPreview(videoUrl, urlInput);
                } else {
                    // エラーメッセージの表示
                    const errorMsg = data.message || "動画が見つかりませんでした。URLが正しいか確認してください。";
                    resultsContainer.innerHTML = `
                        <div style="color:red; font-size:0.9rem; margin-top:15px; padding:10px; background:#fff0f0; border-radius:8px;">
                            ${errorMsg}
                        </div>
                    `;
                }

            } catch (error) {
                console.error("Error:", error);
                resultsContainer.innerHTML = '<p style="color:red; margin-top:15px;">通信エラーが発生しました。</p>';
            } finally {
                btn.disabled = false;
                btn.innerText = "動画を抽出する";
            }
        }

        function showPreview(videoUrl, originalUrl) {
            const resultsContainer = document.getElementById('results');
            
            resultsContainer.innerHTML = `
                <div class="preview-container">
                    <p style="font-weight: bold; margin-bottom: 12px; font-size: 0.9rem; color:#28a745;">動画が見つかりました！</p>
                    <video src="${videoUrl}" controls class="preview-video"></video>
                    <button class="save-confirm-btn" onclick="saveToDatabase('${videoUrl}', '${originalUrl}')">
                        この動画をランキングに登録
                    </button>
                </div>
            `;
        }

        // --- ステップ3：データベース保存（Supabase）で実装する部分 ---
        function saveToDatabase(videoUrl, tweetUrl) {
            alert("抽出に成功しました！\n次は『ステップ3：Supabaseに保存』を実装しましょう。\nこれで本当のランキングサイトになります。");
            console.log("保存準備:", { videoUrl, tweetUrl });
        }
    </script>
</body>
</html>
