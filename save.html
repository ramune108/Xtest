<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">        
    <title>動画を保存 - 保存ランキング</title>
    <link rel="stylesheet" href="style.css">
    <!-- Supabase ライブラリの読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .preview-container { margin-top: 20px; padding: 20px; background: #fff; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .preview-video { width: 100%; border-radius: 10px; margin-bottom: 15px; background: #000; }
        .save-confirm-btn { background: #28a745; color: #fff; border: none; padding: 15px 20px; border-radius: 10px; font-weight: bold; width: 100%; font-size: 1rem; cursor: pointer; }
        .loading-spinner { margin: 30px auto; border: 4px solid #f3f3f3; border-top: 4px solid #1da1f2; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header class="header"><a href="index.html" class="logo">保存ランキング</a></header>

    <main class="input-container">
        <p style="font-size: 0.9rem; margin-bottom: 15px; color: #555;">URLを貼り付けてダウンロードすると、自動的にランキングに登録されます。</p>
        <input type="text" id="tweetUrl" class="text-input" placeholder="https://x.com/...">
        <button id="extractBtn" class="primary-btn" onclick="extractVideo()">動画を抽出する</button>
        <div id="results"></div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏆</span>ランキング</a>
        <a href="search.html" class="nav-item"><span class="nav-icon">🔍</span>検索</a>
        <a href="save.html" class="nav-item active"><span class="nav-icon">➕</span>保存</a>
    </nav>

    <script>
        // --- 1. Supabaseの初期設定 ---
        const SUPABASE_URL = 'https://jziiuyezguukewkfpudw.supabase.co'; // ここを書き換え
        const SUPABASE_KEY = 'sb_publishable_KWKB8rprJAhTqQz9PoNscg_NowmknXH'; // ここを書き換え
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function extractVideo() {
            const urlInput = document.getElementById('tweetUrl').value;
            const btn = document.getElementById('extractBtn');
            const resultsContainer = document.getElementById('results');

            if (!urlInput) { alert("URLを入力してください"); return; }
            btn.disabled = true; btn.innerText = "解析中...";
            resultsContainer.innerHTML = '<div class="loading-spinner"></div>';

            try {
                const response = await fetch("/api", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: urlInput })
                });
                const data = await response.json();

                if (data.status === "success") {
                    resultsContainer.innerHTML = `
                        <div class="preview-container">
                            <video src="${data.url}" controls class="preview-video" poster="${data.thumbnail}"></video>
                            <button class="save-confirm-btn" onclick="downloadAndRegister('${data.url}', '${urlInput}', '${data.thumbnail}', '${data.title}')">
                                📥 ダウンロードして保存
                            </button>
                            <p style="font-size:0.7rem; color:#888; margin-top:10px;">※ダウンロードするとランキングに反映されます</p>
                        </div>
                    `;
                } else {
                    resultsContainer.innerHTML = `<p style="color:red;">エラー: ${data.message}</p>`;
                }
            } catch (error) {
                resultsContainer.innerHTML = '<p style="color:red;">通信エラーが発生しました。</p>';
            } finally {
                btn.disabled = false; btn.innerText = "動画を抽出する";
            }
        }

        // --- 2. ダウンロードと同時にランキング登録する魔法の関数 ---
        async function downloadAndRegister(videoUrl, tweetUrl, thumbUrl, title) {
            // A. 動画を別タブで開く（ユーザーが保存できるようにする）
            window.open(videoUrl, '_blank');

            // B. Supabaseの関数（ステップ1で作ったやつ）を呼び出す
            const { error } = await _supabase.rpc('increment_save_count', {
                target_tweet_url: tweetUrl,
                target_video_url: videoUrl,
                target_thumbnail_url: thumbUrl,
                target_title: title
            });

            if (error) {
                console.error("ランキング登録エラー:", error);
            } else {
                alert("保存を開始しました。ランキングにも反映されました！");
            }
        }
    </script>
</body>
</html>
