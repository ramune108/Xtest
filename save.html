<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Save - Twitter Video Tools</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome v6 & jQuery & Supabase -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 共通JSを読み込む -->
    <script src="main.js"></script>
</head>
<body>

    <header class="site-header">
        <a href="index.html">Twitter Video Tools</a>
    </header>

    <main class="input-container">
        <p style="font-weight: bold; color: #555; margin-bottom: 15px;">Save Twitter Video</p>
        <input type="text" id="tweetUrl" class="text-input" placeholder="Paste X URL here...">
        <button id="extractBtn" class="primary-btn" onclick="extractVideo()">
            <i class="fas fa-file-download"></i> Extract Video
        </button>
        <div id="results"></div>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-trophy" style="font-size:18px;"></i>Ranking</a>
        <a href="search.html" class="nav-item"><i class="fas fa-search" style="font-size:18px;"></i>Search</a>
        <a href="save.html" class="nav-item active"><i class="fas fa-plus-circle" style="font-size:18px;"></i>Save</a>
    </nav>

    <script>
        async function extractVideo() {
            const urlInput = $('#tweetUrl').val().trim();
            if (!urlInput) { alert("URLを入力してください"); return; }

            // UIを抽出中モードへ
            $('#extractBtn').prop('disabled', true).text("Extracting...");
            $('#results').html('<p style="margin-top:20px;">Analyzing with yt-dlp...</p>');

            try {
                // 1. Python API (/api/index.py) へ抽出リクエスト
                const response = await fetch("/api", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ url: urlInput })
                });
                const data = await response.json();

                if (data.status === "success") {
                    // 2. 自動でSupabaseに保存（ランキングカウントアップ）
                    await _supabase.rpc('increment_save_count', {
                        target_tweet_url: urlInput, 
                        target_video_url: data.url, 
                        target_thumbnail_url: data.thumbnail, 
                        target_title: data.title
                    });

                    // 3. 動画を表示（watch.html へのリンク付き）
                    $('#results').html(`
                        <div class="preview-box">
                            <p style="font-size:0.8rem; color:#28a745; font-weight:bold; margin-bottom:10px;">
                                <i class="fas fa-check-circle"></i> Success! Added to Ranking.
                            </p>
                            <img src="${data.thumbnail}" class="preview-video">
                            <!-- 動画ページ(watch.html)へ遷移させる -->
                            <a href="watch.html?url=${encodeURIComponent(data.url)}" target="_blank" class="download-btn">
                                <i class="fas fa-play"></i> Watch / Download
                            </a>
                        </div>
                    `);
                } else {
                    $('#results').html(`<p style="color:red; margin-top:20px;">Error: ${data.message}</p>`);
                }
            } catch (e) {
                $('#results').html('<p style="color:red; margin-top:20px;">Connection Error.</p>');
            } finally {
                $('#extractBtn').prop('disabled', false).html('<i class="fas fa-file-download"></i> Extract Video');
            }
        }
    </script>
</body>
</html>
