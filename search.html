<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動画検索 - 保存ランキング</title>
    <link rel="stylesheet" href="style.css">
    <meta name="referrer" content="no-referrer"> <!-- 動画再生に必須 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 検索ページ専用：検索結果の件数表示 */
        .search-info {
            padding: 10px 15px;
            font-size: 0.8rem;
            color: #666;
            background: #fff;
        }
        /* スピナーの共通化 */
        .loading-spinner { margin: 30px auto; border: 4px solid #f3f3f3; border-top: 4px solid #1da1f2; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">動画検索</a>
    </header>

    <!-- 検索入力エリア -->
    <main class="input-container">
        <input type="text" id="searchQuery" class="text-input" placeholder="キーワード（猫、アニメなど）を入力..." onkeypress="handleKeyPress(event)">
        <button id="searchBtn" class="primary-btn" onclick="executeSearch()">検索する</button>
    </main>

    <!-- 検索結果のステータス表示 -->
    <div id="searchInfo" class="search-info" style="display: none;"></div>

    <!-- 検索結果一覧（2列タイル） -->
    <div id="videoGrid" class="video-grid">
        <!-- ここに検索結果が表示されます -->
    </div>

    <!-- 下部ナビゲーション -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><span class="nav-icon">🏆</span>ランキング</a>
        <a href="search.html" class="nav-item active"><span class="nav-icon">🔍</span>検索</a>
        <a href="save.html" class="nav-item"><span class="nav-icon">➕</span>保存</a>
    </nav>

    <script>
        // --- 1. Supabaseの初期設定（自分のものに書き換えてください） ---
        const SUPABASE_URL = 'https://jziiuyezguukewkfpudw.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_KWKB8rprJAhTqQz9PoNscg_NowmknXH';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // エンターキーでも検索できるようにする
        function handleKeyPress(e) {
            if (e.key === 'Enter') executeSearch();
        }

        // --- 2. 検索実行関数 ---
        async function executeSearch() {
            const query = document.getElementById('searchQuery').value.trim();
            const grid = document.getElementById('videoGrid');
            const info = document.getElementById('searchInfo');

            if (!query) {
                alert("検索ワードを入力してください");
                return;
            }

            // 検索中表示
            grid.innerHTML = '<div style="grid-column: 1/3;"><div class="loading-spinner"></div></div>';
            info.style.display = "none";

            try {
                // Supabaseで「あいまい検索（ilike）」を実行
                // タイトルにキーワードが含まれているものを取得
                const { data, error } = await _supabase
                    .from('videos')
                    .select('*')
                    .ilike('title', `%${query}%`) // %キーワード% で部分一致検索
                    .order('save_count', { ascending: false }); // 人気順に並べる

                if (error) throw error;

                // 結果の表示
                info.style.display = "block";
                info.innerText = `「${query}」の検索結果: ${data.length} 件`;

                if (data.length === 0) {
                    grid.innerHTML = '<p style="grid-column: 1/3; text-align:center; padding:50px; color:#888;">一致する動画が見つかりませんでした。</p>';
                } else {
                    grid.innerHTML = data.map(video => `
                        <div class="video-card">
                            <img src="${video.thumbnail_url}" class="thumb" loading="lazy">
                            <a href="${video.video_url}" target="_blank" class="main-link" rel="noreferrer"></a>
                            <a href="${video.tweet_url}" target="_blank" class="x-link">
                                <svg viewBox="0 0 24 24" class="x-icon"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
                            </a>
                            <div class="rating-bar">
                                <span class="vote-btn">💾 ${video.save_count} 保存</span>
                                <span class="vote-btn">👍 Good</span>
                            </div>
                        </div>
                    `).join('');
                }

            } catch (e) {
                console.error("検索エラー:", e);
                grid.innerHTML = '<p style="grid-column: 1/3; text-align:center; padding:20px; color:red;">検索中にエラーが発生しました。</p>';
            }
        }
    </script>
</body>
</html>
