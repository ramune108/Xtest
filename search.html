<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Search - Twitter Video Tools</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="site-header"><a href="index.html">Twitter Video Tools</a></header>

    <main class="input-container">
        <input type="text" id="searchQuery" class="text-input" placeholder="動画を検索（猫、アニメ、etc...）">
        <button class="primary-btn" onclick="executeSearch()"><i class="fas fa-search"></i> 検索する</button>
    </main>

    <div id="videoGrid" class="video-grid">
        <!-- 検索結果 -->
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-trophy nav-icon"></i>Ranking</a>
        <a href="search.html" class="nav-item active"><i class="fas fa-search nav-icon"></i>Search</a>
        <a href="save.html" class="nav-item"><i class="fas fa-plus-circle nav-icon"></i>Save</a>
    </nav>

    <script>
        const SUPABASE_URL = 'https://jziiuyezguukewkfpudw.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_KWKB8rprJAhTqQz9PoNscg_NowmknXH';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function executeSearch() {
            const query = document.getElementById('searchQuery').value;
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '<p style="grid-column:1/3; text-align:center;">Searching...</p>';

            const { data, error } = await _supabase
                .from('videos').select('*')
                .ilike('title', `%${query}%`)
                .order('save_count', { ascending: false });

            if (data.length === 0) {
                grid.innerHTML = '<p style="grid-column:1/3; text-align:center;">No videos found.</p>';
                return;
            }

            grid.innerHTML = data.map(v => `
                <div class="listn">
                    <a href="${v.video_url}" target="_blank" rel="noreferrer">
                        <img src="${v.thumbnail_url}" loading="lazy">
                    </a>
                    <div class="user"><a href="${v.tweet_url}" target="_blank">@${v.title.substring(0,10)}...</a></div>
                    <div class="vote-bar">
                        <div class="save-count">💾 ${v.save_count}</div>
                        <div>👍 ${v.good_count || 0}</div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
