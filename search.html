<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Search - Twitter Video Tools</title>
    <link rel="stylesheet" href="style.css">
    <!-- 最新 FontAwesome v6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- 共通JS -->
    <script src="main.js"></script>
</head>
<body>

    <header class="site-header">
        <a href="index.html">Twitter Video Tools</a>
    </header>

    <main class="input-container">
        <!-- 検索フォーム -->
        <input type="text" id="searchQuery" class="text-input" placeholder="Search keywords..." onkeypress="if(event.key==='Enter')executeSearch()">
        <button class="primary-btn" onclick="executeSearch()">
            <i class="fas fa-search"></i> Search
        </button>
    </main>

    <!-- 検索結果表示エリア -->
    <div id="videoGrid" class="video-grid"></div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-trophy nav-icon"></i>Ranking</a>
        <a href="search.html" class="nav-item active"><i class="fas fa-search nav-icon"></i>Search</a>
        <a href="save.html" class="nav-item"><i class="fas fa-plus-circle nav-icon"></i>Save</a>
    </nav>

    <script>
        async function executeSearch() {
            const query = $('#searchQuery').val().trim();
            if(!query) return;
            
            const grid = $('#videoGrid');
            grid.html('<p style="column-span:all; text-align:center; padding:20px;">Searching...</p>');

            try {
                // Supabaseであいまい検索
                const { data, error } = await _supabase
                    .from('videos')
                    .select('*')
                    .ilike('title', `%${query}%`)
                    .order('save_count', { ascending: false });
                
                if(!data || data.length === 0) {
                    grid.html('<p style="column-span:all; text-align:center; padding:20px;">No videos found.</p>');
                    return;
                }

                // タイル生成
                const gridHtml = data.map((v, index) => `
                    <div class="listn">
                        <div class="rank-badge">No.${index + 1}</div>
                        <a href="${v.tweet_url}" target="_blank" class="x-link-top">
                            <i class="fa-brands fa-x-twitter" style="color:white !important;"></i>
                        </a>
                        <!-- watch.html へ飛ぶように修正 -->
                        <a href="watch.html?url=${encodeURIComponent(v.video_url)}" target="_blank" rel="noreferrer">
                            <img src="${v.thumbnail_url}">
                        </a>
                        <div class="tile-controls">
                            <button class="icon-btn" onclick="handleVote(${v.id}, 'good', this)"><i class="fas fa-thumbs-up"></i></button>
                            <a href="index.html?v=${v.id}" class="name-badge">${v.title ? escapeHTML(v.title.substring(0,10)) : 'Video'}</a>
                            <button class="icon-btn" onclick="handleVote(${v.id}, 'bad', this)"><i class="fas fa-thumbs-down"></i></button>
                        </div>
                    </div>
                `).join('');
                grid.html(gridHtml);
            } catch (e) {
                grid.html('<p style="column-span:all; text-align:center;">Search Error.</p>');
                console.error(e);
            }
        }
    </script>
</body>
</html>
