<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Search - Twitter Video Tools</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 検索結果のタイルレイアウト（index.htmlと統一） */
        .video-grid {
            column-count: 2;
            column-gap: 10px;
            padding: 10px;
            max-width: 800px;
            margin: 0 auto;
        }
        .listn {
            break-inside: avoid;
            margin-bottom: 10px;
            position: relative;
            background: #fff;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>

    <header class="site-header">
        <a href="index.html">Twitter Video Tools</a>
    </header>

    <main class="input-container">
        <input type="text" id="searchQuery" class="text-input" placeholder="キーワード（猫、アニメなど）を入力..." onkeypress="if(event.key==='Enter')executeSearch()">
        <button class="primary-btn" onclick="executeSearch()">
            <i class="fas fa-search"></i> Search
        </button>
    </main>

    <div id="videoGrid" class="video-grid">
        <!-- 検索結果がここに表示されます -->
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-trophy nav-icon"></i>Ranking</a>
        <a href="search.html" class="nav-item active"><i class="fas fa-search nav-icon"></i>Search</a>
        <a href="save.html" class="nav-item"><i class="fas fa-plus-circle nav-icon"></i>Save</a>
    </nav>

    <script>
        const SUPABASE_URL = 'https://jziiuyezguukewkfpudw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_KWKB8rprJAhTqQz9PoNscg_NowmknXH';
        let _supabase;

        window.onload = () => {
            _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        };

        async function executeSearch() {
            if (!_supabase) return;
            const query = document.getElementById('searchQuery').value.trim();
            const grid = document.getElementById('videoGrid');

            if (!query) { alert("キーワードを入力してください"); return; }

            grid.innerHTML = '<p style="column-span:all; text-align:center; padding:20px;">Searching...</p>';

            try {
                const { data, error } = await _supabase
                    .from('videos')
                    .select('*')
                    .ilike('title', `%${query}%`)
                    .order('save_count', { ascending: false });

                if (error || !data || data.length === 0) {
                    grid.innerHTML = '<p style="column-span:all; text-align:center; padding:20px;">No results found.</p>';
                    return;
                }

                grid.innerHTML = data.map(v => `
                    <div class="listn">
                        <a href="${v.video_url}" target="_blank" rel="noreferrer">
                            <img src="${v.thumbnail_url}" loading="lazy">
                        </a>
                        <div class="user">
                            <a href="${v.tweet_url}" target="_blank">
                                <div><span>@${v.title ? v.title.substring(0, 15) : 'Unknown'}</span></div>
                            </a>
                        </div>
                        <div class="vote">
                            <a href="javascript:void(0)" class="up" onclick="handleVote(${v.id}, 'good', this)">
                                <div><span><i class="fas fa-thumbs-up"></i> ${v.save_count}</span></div>
                            </a>
                            <a href="javascript:void(0)" class="down" onclick="handleVote(${v.id}, 'bad', this)">
                                <div><span><i class="fas fa-thumbs-down"></i></span></div>
                            </a>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                grid.innerHTML = '<p style="column-span:all; text-align:center;">Search error.</p>';
            }
        }

        async function handleVote(id, type, element) {
            const column = type === 'good' ? 'good_count' : 'bad_count';
            const { error } = await _supabase.rpc('increment_vote', { row_id: id, col_name: column });
            if (!error) {
                element.querySelector('i').classList.add('voted-icon');
                element.style.pointerEvents = 'none';
            }
        }
    </script>
</body>
</html>
