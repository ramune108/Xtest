<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保存ランキング - 人気の動画一覧</title>
    <link rel="stylesheet" href="style.css">
    <meta name="referrer" content="no-referrer"> <!-- ここでもリファラを隠すのが大事 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">保存ランキング</a>
    </header>

    <!-- 期間選択タブ -->
    <div class="tabs">
        <button class="tab" id="tab-1d" onclick="loadRanking('1d')">1日</button>
        <button class="tab" id="tab-3d" onclick="loadRanking('3d')">3日</button>
        <button class="tab active" id="tab-all" onclick="loadRanking('all')">全期間</button>
    </div>

    <!-- ランキング表示エリア（2列タイル） -->
    <div id="videoGrid" class="video-grid">
        <!-- ここにJavaScriptで動画が並びます -->
    </div>

    <!-- 下部ナビゲーション -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><span class="nav-icon">🏆</span>ランキング</a>
        <a href="search.html" class="nav-item"><span class="nav-icon">🔍</span>検索</a>
        <a href="save.html" class="nav-item"><span class="nav-icon">➕</span>保存</a>
    </nav>

    <script>
        // --- 1. Supabaseの初期設定 ---
        const SUPABASE_URL = 'あなたのProject URL'; 
        const SUPABASE_KEY = 'あなたのanon public API Key';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ページ読み込み時に実行
        window.onload = () => loadRanking('all');

        // --- 2. ランキングデータを取得して表示する関数 ---
        async function loadRanking(period) {
            // タブの見た目を切り替え
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + period).classList.add('active');

            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '<p style="text-align:center; grid-column: 1/3; padding:20px;">読み込み中...</p>';

            let query = _supabase.from('videos').select('*').order('save_count', { ascending: false });

            // 期間による絞り込み（簡易版）
            const now = new Date();
            if (period === '1d') {
                const yesterday = new Date(now.getTime() - (24 * 60 * 60 * 1000)).toISOString();
                query = query.gte('created_at', yesterday);
            } else if (period === '3d') {
                const threeDaysAgo = new Date(now.getTime() - (3 * 24 * 60 * 60 * 1000)).toISOString();
                query = query.gte('created_at', threeDaysAgo);
            }

            const { data, error } = await query.limit(20); // 上位20件

            if (error || !data) {
                grid.innerHTML = '<p style="text-align:center; grid-column: 1/3;">データがありません</p>';
                return;
            }

            // HTMLを組み立てる
            grid.innerHTML = data.map(video => `
                <div class="video-card">
                    <!-- サムネイル -->
                    <img src="${video.thumbnail_url}" class="thumb" loading="lazy">
                    
                    <!-- 全面：動画への直リンク -->
                    <a href="${video.video_url}" target="_blank" class="main-link" rel="noreferrer"></a>

                    <!-- 右上：元ツイートへのリンク -->
                    <a href="${video.tweet_url}" target="_blank" class="x-link">
                        <svg viewBox="0 0 24 24" class="x-icon"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"></path></svg>
                    </a>

                    <!-- 下部：保存数（評価バー） -->
                    <div class="rating-bar">
                        <span class="vote-btn">💾 ${video.save_count} 保存</span>
                        <span class="vote-btn">👍 Good</span>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
