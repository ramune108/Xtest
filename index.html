<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Ranking - Twitter Video Tools</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- ライブラリと共通JSの読み込み -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="main.js"></script>
</head>
<body>
    <header class="site-header"><a href="index.html">Twitter Video Tools</a></header>

    <div id="contentArea">
        <div class="sort-options">
            <a id="btn-1d" class="sort-btn btn-1d" href="javascript:void(0)" onclick="loadRanking('1d')">24h</a>
            <a id="btn-3d" class="sort-btn btn-3d" href="javascript:void(0)" onclick="loadRanking('3d')">3d</a>
            <a id="btn-all" class="sort-btn btn-all active" href="javascript:void(0)" onclick="loadRanking('all')">All</a>
        </div>
        <div id="videoGrid" class="video-grid"></div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-trophy" style="font-size:18px;"></i>Ranking</a>
        <a href="search.html" class="nav-item"><i class="fas fa-search" style="font-size:18px;"></i>Search</a>
        <a href="save.html" class="nav-item"><i class="fas fa-plus-circle" style="font-size:18px;"></i>Save</a>
    </nav>

    <script>
        // ページ読み込み時に初期化
        $(document).ready(function() {
            const params = new URLSearchParams(window.location.search);
            const vID = params.get('v');
            if (vID) { showDetail(vID); } else { loadRanking('all'); }
        });

        // --- ランキング表示処理 ---
        async function loadRanking(period) {
            $('.sort-btn').removeClass('active');
            $('#btn-' + period).addClass('active');

            const grid = $('#videoGrid');
            grid.html('<p style="column-span:all; text-align:center; padding:20px;">Loading...</p>');

            let query = _supabase.from('videos').select('*').order('save_count', { ascending: false });
            if (period === '1d') query = query.gte('created_at', new Date(Date.now() - 86400000).toISOString());
            if (period === '3d') query = query.gte('created_at', new Date(Date.now() - 259200000).toISOString());

            const { data } = await query.limit(40);
            if (!data || data.length === 0) { grid.html('<p style="column-span:all; text-align:center;">No data.</p>'); return; }

            grid.html(data.map((v, i) => `
                <div class="listn">
                    <div class="rank-badge">No.${i+1}</div>
                    <a href="${v.tweet_url}" target="_blank" class="x-link-top"><i class="fa-brands fa-x-twitter"></i></a>
                    <a href="watch.html?url=${encodeURIComponent(v.video_url)}" target="_blank" rel="noreferrer">
                        <img src="${v.thumbnail_url}">
                    </a>
                    <div class="tile-controls">
                        <button class="icon-btn" onclick="handleVote(${v.id}, 'good', this)"><i class="fas fa-thumbs-up"></i></button>
                        <a href="index.html?v=${v.id}" class="name-badge">${escapeHTML(v.title?.substring(0,10) || 'Video')}</a>
                        <button class="icon-btn" onclick="handleVote(${v.id}, 'bad', this)"><i class="fas fa-thumbs-down"></i></button>
                    </div>
                </div>
            `).join(''));
        }

        // --- 詳細ページ表示処理 ---
        async function showDetail(id) {
            const { data: v } = await _supabase.from('videos').select('*').eq('id', id).single();
            if (!v) { $('#contentArea').html('<p>Not found.</p>'); return; }

            $('#contentArea').html(`
                <div class="detail-view">
                    <div class="detail-left">
                        <img src="${v.thumbnail_url}" class="detail-thumb">
                        <a href="watch.html?url=${encodeURIComponent(v.video_url)}" class="watch-btn"><i class="fas fa-play"></i> Watch</a>
                    </div>
                    <div class="detail-right">
                        ${v.title ? `<div class="tweet-text-content">${escapeHTML(v.title)}</div>` : ''}
                        <a href="${v.tweet_url}" target="_blank" class="action-btn">View tweet</a>
                        <a href="index.html" class="action-btn">Back to Ranking</a>
                    </div>
                </div>
            `);
        }
    </script>
</body>
</html>
