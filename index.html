<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Twitter Video Tools</title>
    <!-- 外部ソースの読み込み -->
    <link rel="stylesheet" href="https://monsnode.com/common/a.css" />
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; margin: 0; padding-bottom: 70px; }
        .site-header { background-color: #00acee; color: #FFF; padding: 10px; height: 45px; text-align: center; line-height: 25px; }
        .site-header a { text-decoration: none; color: #FFF; font-weight: bold; }

        /* --- タイル表示のカスタムスタイル --- */
        .video-grid { display: flex; flex-wrap: wrap; justify-content: center; padding: 5px; }
        .listn { position: relative; width: calc(50% - 10px); margin: 5px; background: #000; border-radius: 4px; overflow: hidden; }
        .listn img { width: 100%; height: auto; display: block; }
        
        /* タイル下部の Good/User/Bad バー */
        .tile-overlay { position: absolute; bottom: 5px; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 5px; box-sizing: border-box; }
        .vote-btn-tile { background: rgba(0,0,0,0.5); color: white; border: 1px solid #777; border-radius: 4px; padding: 5px 8px; font-size: 14px; cursor: pointer; }
        .user-badge { background: #00acee; color: white; padding: 3px 10px; border-radius: 4px; font-size: 11px; max-width: 50%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* --- 詳細ページのカスタムスタイル --- */
        .detail-container { display: flex; padding: 10px; gap: 10px; max-width: 600px; margin: 0 auto; background: #fff; }
        .detail-left { flex: 1.2; }
        .detail-right { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .detail-thumb { width: 100%; border-radius: 4px; display: block; }
        .watch-btn { background: #333; color: white; padding: 10px; text-align: center; border-radius: 4px; text-decoration: none; display: block; margin-top: 5px; font-weight: bold; }
        
        .action-btn { background: #333; color: white; text-decoration: none; padding: 12px; border-radius: 4px; text-align: center; font-size: 14px; font-weight: bold; }
        .btn-red { background: #dc3545; }
        .tweet-text-box { font-size: 13px; color: #333; line-height: 1.4; margin-bottom: 5px; white-space: pre-wrap; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #fff; border-top: 1px solid #eee; display: flex; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: #888; font-size: 10px; }
        .nav-item.active { color: #00acee; }
    </style>
</head>
<body>

    <header class="site-header"><a href="index.html">Twitter Video Tools</a></header>

    <div id="mainContent">
        <!-- ここにJavaScriptで「一覧」または「詳細」が表示されます -->
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-trophy" style="font-size:18px;"></i>Ranking</a>
        <a href="search.html" class="nav-item"><i class="fas fa-search" style="font-size:18px;"></i>Search</a>
        <a href="save.html" class="nav-item"><i class="fas fa-plus-circle" style="font-size:18px;"></i>Save</a>
    </nav>

    <script>
        const SUPABASE_URL = 'https://jziiuyezguukewkfpudw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_KWKB8rprJAhTqQz9PoNscg_NowmknXH';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        $(document).ready(function() {
            const params = new URLSearchParams(window.location.search);
            const videoId = params.get('v');

            if (videoId) {
                showDetailPage(videoId); // 詳細ページを表示
            } else {
                showRankingPage(); // 一覧ページを表示
            }
        });

        // --- タイル一覧ページの表示 ---
        async function showRankingPage() {
            const { data } = await _supabase.from('videos').select('*').order('save_count', { ascending: false }).limit(40);
            
            let html = '<div class="video-grid">';
            data.forEach(v => {
                // アカウント名の取得（ツイートURLから抽出するか、タイトルの一部を使用）
                const accountName = v.title ? v.title.substring(0, 12) : "Unknown";
                
                html += `
                    <div class="listn">
                        <a href="index.html?v=${v.id}">
                            <img src="${v.thumbnail_url}">
                        </a>
                        <div class="tile-overlay">
                            <button class="vote-btn-tile" onclick="vote(${v.id}, 'good')"><i class="fas fa-thumbs-up"></i></button>
                            <div class="user-badge">${accountName}</div>
                            <button class="vote-btn-tile" onclick="vote(${v.id}, 'bad')"><i class="fas fa-thumbs-down"></i></button>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            $('#mainContent').html(html);
        }

        // --- 詳細ページの表示 ---
        async function showDetailPage(id) {
            const { data } = await _supabase.from('videos').select('*').eq('id', id).single();
            if (!data) return;

            const html = `
                <div class="detail-container">
                    <div class="detail-left">
                        <img src="${data.thumbnail_url}" class="detail-thumb">
                        <a href="${data.video_url}" target="_blank" class="watch-btn" rel="noreferrer"><i class="fas fa-play"></i> Watch</a>
                    </div>
                    <div class="detail-right">
                        ${data.title ? `<div class="tweet-text-box">${data.title}</div>` : ''}
                        <a href="${data.tweet_url}" target="_blank" class="action-btn">View tweet</a>
                        <a href="https://x.com/search?q=${encodeURIComponent(data.title)}" target="_blank" class="action-btn">Timeline</a>
                        <a href="#" class="action-btn" onclick="vote(${data.id}, 'good')">Bookmark</a>
                        <a href="index.html" class="action-btn">Watch more</a>
                        <a href="#" class="action-btn btn-red"><i class="fas fa-flag"></i> Report abuse</a>
                    </div>
                </div>
            `;
            $('#mainContent').html(html);
        }

        async function vote(id, type) {
            const col = type === 'good' ? 'good_count' : 'bad_count';
            await _supabase.rpc('increment_vote', { row_id: id, col_name: col });
            alert("Voted!");
        }
    </script>
</body>
</html>
