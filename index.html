<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Twitter Video Tools - 保存ランキング</title>
    <link rel="stylesheet" href="style.css">
    <!-- Supabaseの読み込み -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="site-header">
        <a href="index.html">Twitter Video Tools</a>
    </header>

    <!-- ソートオプション -->
    <div class="sort-options">
        <a id="btn-1d" class="sort-btn btn-24h" href="javascript:loadRanking('1d')"><i class="fas fa-clock"></i> 24h</a>
        <a id="btn-3d" class="sort-btn btn-3d" href="javascript:loadRanking('3d')"><i class="fas fa-calendar-day"></i> 3d</a>
        <a id="btn-all" class="sort-btn btn-7d active" href="javascript:loadRanking('all')"><i class="fas fa-calendar-week"></i> All</a>
    </div>

    <!-- メイングリッド -->
    <div id="videoGrid" class="video-grid">
        <!-- JSでタイルが生成されます -->
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-trophy nav-icon"></i>Ranking</a>
        <a href="search.html" class="nav-item"><i class="fas fa-search nav-icon"></i>Search</a>
        <a href="save.html" class="nav-item"><i class="fas fa-plus-circle nav-icon"></i>Save</a>
    </nav>

    <script>
        const SUPABASE_URL = 'https://jziiuyezguukewkfpudw.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_KWKB8rprJAhTqQz9PoNscg_NowmknXH';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = () => loadRanking('all');

        async function loadRanking(period) {
            // UI切り替え
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + period).classList.add('active');

            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '<p style="grid-column:1/3; text-align:center;">Loading...</p>';

            let query = _supabase.from('videos').select('*').order('save_count', { ascending: false });

            if (period === '1d') {
                const yesterday = new Date(Date.now() - 86400000).toISOString();
                query = query.gte('created_at', yesterday);
            } else if (period === '3d') {
                const threeDaysAgo = new Date(Date.now() - 259200000).toISOString();
                query = query.gte('created_at', threeDaysAgo);
            }

            const { data, error } = await query.limit(40);

            if (error || !data || data.length === 0) {
                grid.innerHTML = '<p style="grid-column:1/3; text-align:center;">No Data</p>';
                return;
            }

            grid.innerHTML = data.map(v => `
                <div class="listn" id="card-${v.id}">
                    <a href="${v.video_url}" target="_blank" rel="noreferrer">
                        <img src="${v.thumbnail_url}" alt="${v.title}" loading="lazy">
                    </a>
                    <div class="user">
                        <a href="${v.tweet_url}" target="_blank"><span>@${v.title.substring(0, 15)}...</span></a>
                    </div>
                    <div class="vote-bar">
                        <div class="save-count">💾 ${v.save_count}</div>
                        <div class="vote-buttons">
                            <a href="javascript:void(0)" class="vote-link up" onclick="handleVote(${v.id}, 'good', this)">
                                <i class="fas fa-thumbs-up"></i>
                            </a>
                            <a href="javascript:void(0)" class="vote-link down" onclick="handleVote(${v.id}, 'bad', this)">
                                <i class="fas fa-thumbs-down"></i>
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function handleVote(id, type, element) {
            const column = type === 'good' ? 'good_count' : 'bad_count';
            
            // Supabaseでカウントアップ
            const { error } = await _supabase.rpc('increment_vote', { 
                row_id: id, 
                col_name: column 
            });

            if (!error) {
                element.classList.add('voted');
                // 反対側のボタンも無効化
                const parent = element.parentElement;
                parent.querySelectorAll('.vote-link').forEach(el => el.classList.add('voted'));
            }
        }
    </script>
</body>
</html>
