<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Twitter Video Tools</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="site-header"><a href="index.html">Twitter Video Tools</a></header>

    <div id="contentArea">
        <!-- JSで一覧または詳細を切り替え -->
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-trophy" style="font-size:18px;"></i>Ranking</a>
        <a href="search.html" class="nav-item"><i class="fas fa-search" style="font-size:18px;"></i>Search</a>
        <a href="save.html" class="nav-item"><i class="fas fa-plus-circle" style="font-size:18px;"></i>Save</a>
    </nav>

    <script>
        const SUPABASE_URL = 'https://jziiuyezguukewkfpudw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_KWKB8rprJAhTqQz9PoNscg_NowmknXH';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        $(document).ready(function() {
            const params = new URLSearchParams(window.location.search);
            const vID = params.get('v');
            if (vID) { showDetail(vID); } else { showRanking(); }
        });

        // --- ランキング一覧表示 ---
        async function showRanking() {
            // 期間選択ボタンを表示
            let headerHtml = `
                <div class="sort-options">
                    <a class="sort-btn btn-1d" href="index.html?p=1d">24h</a>
                    <a class="sort-btn btn-3d" href="index.html?p=3d">3d</a>
                    <a class="sort-btn btn-all active" href="index.html">All</a>
                </div>
                <div class="video-grid" id="videoGrid">Loading...</div>
            `;
            $('#contentArea').html(headerHtml);

            const { data } = await _supabase.from('videos').select('*').order('save_count', { ascending: false }).limit(40);
            
            const gridHtml = data.map(v => `
                <div class="listn">
                    <!-- 画像クリックで動画再生 -->
                    <a href="${v.video_url}" target="_blank" rel="noreferrer">
                        <img src="${v.thumbnail_url}">
                    </a>
                    <div class="tile-controls">
                        <button class="icon-btn" onclick="vote(${v.id}, 'good')"><i class="fas fa-thumbs-up"></i></button>
                        <!-- 名前クリックで詳細ページ -->
                        <a href="index.html?v=${v.id}" class="name-badge">${v.title ? v.title.substring(0,10) : 'Video'}</a>
                        <button class="icon-btn" onclick="vote(${v.id}, 'bad')"><i class="fas fa-thumbs-down"></i></button>
                    </div>
                </div>
            `).join('');
            $('#videoGrid').html(gridHtml);
        }

        // --- 詳細ページ表示 ---
        async function showDetail(id) {
            const { data: v } = await _supabase.from('videos').select('*').eq('id', id).single();
            if (!v) return;

            const detailHtml = `
                <div class="detail-view">
                    <div class="detail-left">
                        <img src="${v.thumbnail_url}" class="detail-thumb">
                        <a href="${v.video_url}" target="_blank" class="watch-btn" rel="noreferrer"><i class="fas fa-play"></i> Watch</a>
                    </div>
                    <div class="detail-right">
                        ${v.title ? `<div class="tweet-text-content">${v.title}</div>` : ''}
                        <a href="${v.tweet_url}" target="_blank" class="action-btn">View tweet</a>
                        <a href="https://x.com/search?q=${encodeURIComponent(v.title)}" target="_blank" class="action-btn">Timeline</a>
                        <a href="javascript:void(0)" class="action-btn" onclick="vote(${v.id}, 'good')">Bookmark</a>
                        <a href="index.html" class="action-btn">Watch more</a>
                        <a href="#" class="action-btn btn-red"><i class="fas fa-flag"></i> Report abuse</a>
                    </div>
                </div>
            `;
            $('#contentArea').html(detailHtml);
        }

        async function vote(id, type) {
            const col = type === 'good' ? 'good_count' : 'bad_count';
            await _supabase.rpc('increment_vote', { row_id: id, col_name: col });
            alert("Voted!");
        }
    </script>
</body>
</html>
