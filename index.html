<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Ranking - Twitter Video Tools</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="site-header"><a href="index.html">Twitter Video Tools</a></header>

    <div class="sort-options">
        <a id="btn-1d" class="sort-btn btn-1d" href="javascript:loadRanking('1d')"><i class="fas fa-clock"></i> 24h</a>
        <a id="btn-3d" class="sort-btn btn-3d" href="javascript:loadRanking('3d')"><i class="fas fa-calendar-day"></i> 3d</a>
        <a id="btn-all" class="sort-btn btn-all active" href="javascript:loadRanking('all')"><i class="fas fa-calendar-week"></i> All</a>
    </div>

    <div id="videoGrid" class="video-grid"></div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><i class="fas fa-trophy nav-icon"></i>Ranking</a>
        <a href="search.html" class="nav-item"><i class="fas fa-search nav-icon"></i>Search</a>
        <a href="save.html" class="nav-item"><i class="fas fa-plus-circle nav-icon"></i>Save</a>
    </nav>

    <script>
        const SUPABASE_URL = 'https://jziiuyezguukewkfpudw.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_KWKB8rprJAhTqQz9PoNscg_NowmknXH';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = () => loadRanking('all');

        async function loadRanking(period) {
            document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById('btn-' + period);
            if (activeBtn) activeBtn.classList.add('active');

            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '<p style="padding:20px;">Loading...</p>';

            let query = _supabase.from('videos').select('*').order('save_count', { ascending: false });
            if (period === '1d') query = query.gte('created_at', new Date(Date.now() - 86400000).toISOString());
            if (period === '3d') query = query.gte('created_at', new Date(Date.now() - 259200000).toISOString());

            const { data, error } = await query.limit(40);
            if (error || !data || data.length === 0) {
                grid.innerHTML = '<p>No data found.</p>'; return;
            }

            grid.innerHTML = data.map(v => `
                <div class="listn" id="${v.id}" style="position: relative;">
                    <a href="${v.video_url}" target="_blank" rel="noreferrer">
                        <img src="${v.thumbnail_url}" alt="${v.title}">
                    </a>
                    <div class="user">
                        <a href="${v.tweet_url}" target="_blank"><span>@${v.title ? v.title.substring(0, 15) : 'Unknown'}</span></a>
                    </div>
                    <div class="vote">
                        <a href="javascript:void(0)" class="up" onclick="handleVote(${v.id}, 'good', this)">
                            <div><span><i class="fas fa-thumbs-up"></i> ${v.save_count}</span></div>
                        </a>
                        <a href="javascript:void(0)" class="down" onclick="handleVote(${v.id}, 'bad', this)">
                            <div><span><i class="fas fa-thumbs-down"></i></span></div>
                        </a>
                    </div>
                </div>
            `).join('');
        }

        async function handleVote(id, type, element) {
            const column = type === 'good' ? 'good_count' : 'bad_count';
            const { error } = await _supabase.rpc('increment_vote', { row_id: id, col_name: column });
            if (!error) {
                element.querySelector('i').classList.add('voted-icon');
                element.style.pointerEvents = 'none';
            }
        }
    </script>
</body>
</html>
